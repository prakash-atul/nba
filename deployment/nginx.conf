# HTTP only — Certbot will automatically add HTTPS block after cert issuance
server {
    listen 80;
    server_name api.nba.wily.in;
    root /var/www/html/nba/api;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to FastCGI server
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;

        # PHP 8.3
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;

        # Environment Variables for Database
        fastcgi_param DB_HOST localhost;
        fastcgi_param DB_NAME nba_db;
        fastcgi_param DB_USER nba_user;
        fastcgi_param DB_PASS TUnba@420;
    }

    location ~ /\.ht {
        deny all;
    }
}
